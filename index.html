<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum de Fotos</title>
    <style>
        :root {
            --bg-body: #f8f9fa;
            --bg-card: #ffffff;
            --text-main: #3c4043;
            --pastel-green: #e6f4ea;
            --pastel-green-dark: #137333;
            --border-color: #dadce0;
        }
        body {
            font-family: 'Roboto', 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }
        /* Topbar estilo Google */
        .topbar {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .topbar h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 400;
            color: #5f6368;
        }
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }
        /* Caixa de Login centralizada */
        .login-box {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 30px;
            max-width: 360px;
            margin: 100px auto text-align center;
            box-shadow: 0 1px 3px rgba(60,64,67,0.3);
            text-align: center;
        }
        .login-box h3 { margin-top: 0; color: #202124; font-weight: 500; }
        input[type="password"] {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            background-color: var(--pastel-green);
            color: var(--pastel-green-dark);
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: #d2ebd9; }
        .hidden { display: none !important; }
        
        /* Menu de Pastas em Botões (Estilo Abas/Filtros) */
        .folder-menu {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }
        .folder-btn {
            background: var(--bg-card);
            color: #5f6368;
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }
        .folder-btn.active {
            background: var(--pastel-green);
            color: var(--pastel-green-dark);
            border-color: transparent;
            font-weight: bold;
        }

        /* Grade Estilo Google Fotos */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
        }
        .photo-item {
            background: var(--bg-card);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: transform 0.15s;
        }
        .photo-item:hover {
            transform: scale(1.02);
        }
        .media-container {
            position: relative;
            width: 100%;
            padding-top: 75%; /* Proporção 4:3 charmosa */
            background: #ebebeb;
        }
        .media-container img, .media-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .photo-info {
            padding: 12px;
            font-size: 14px;
            color: #3c4043;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background: #fafafa;
            border-top: 1px solid var(--border-color);
        }
    </style>
</head>
<body>

<div class="topbar">
    <h1>🍀 Album</h1>
</div>

<div class="main-container">

    <!-- TELA DE LOGIN -->
    <div id="login-box" class="login-box">
        <h3>Acessar Álbum Pessoal</h3>
        <input type="password" id="senha" placeholder="Digite a senha">
        <button onclick="autenticar()">Visualizar</button>
        <p id="erro" style="color: #c5221f; font-size: 14px; margin-top: 10px;"></p>
    </div>

    <!-- CONTEÚDO DO ÁLBUM -->
    <div id="album-content" class="hidden">
        <!-- Menu Dinâmico de Pastas -->
        <div id="folder-menu" class="folder-menu"></div>

        <!-- Grade de Fotos -->
        <div id="photo-grid" class="photo-grid"></div>
    </div>

</div>

<script>
    // ⚠️ SUBSTITUA COM A URL DO SEU WORKER DA CLOUDFLARE:
    const WORKER_URL = "https://api-album.bruno-d-souza.workers.dev/";
    
    let senhaSalva = "";
    let pastaAtiva = "";

    async function autenticar() {
        const senhaInput = document.getElementById("senha").value;
        const erroTxt = document.getElementById("erro");
        
        try {
            const response = await fetch(WORKER_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ senha: senhaInput, pasta: "" })
            });

            if (!response.ok) throw new Error();

            senhaSalva = senhaInput;
            document.getElementById("login-box").classList.add("hidden");
            document.getElementById("album-content").classList.remove("hidden");
            
            carregarDados();
        } catch (err) {
            erroTxt.innerText = "Senha incorreta. Tente novamente.";
        }
    }

    async function carregarDados() {
        const grid = document.getElementById("photo-grid");
        grid.innerHTML = "<p>Buscando suas mídias...</p>";

        try {
            const response = await fetch(WORKER_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ senha: senhaSalva, pasta: pastaAtiva })
            });

            const dados = await response.json();
            
            // 1. Renderiza o Menu de Pastas Dinamicamente
            renderizarMenuPastas(dados.pastas);

            // 2. Renderiza as Mídias
            grid.innerHTML = "";
            if (!dados.arquivos || dados.arquivos.length === 0) {
                grid.innerHTML = "<p>Nenhuma foto ou vídeo encontrado aqui.</p>";
                return;
            }

            dados.arquivos.forEach(arq => {
                const item = document.createElement("div");
                item.className = "photo-item";

                const mediaContainer = document.createElement("div");
                mediaContainer.className = "media-container";

                const extensao = arq.nome.split('.').pop().toLowerCase();
                const ehVideo = ['mp4', 'webm', 'mov'].includes(extensao);

                if (ehVideo) {
                    const video = document.createElement("video");
                    video.src = arq.url;
                    video.controls = true;
                    mediaContainer.appendChild(video);
                } else {
                    const img = document.createElement("img");
                    img.src = arq.url;
                    mediaContainer.appendChild(img);
                }

                const info = document.createElement("div");
                info.className = "photo-info";
                info.innerText = arq.nome;

                item.appendChild(mediaContainer);
                item.appendChild(info);
                grid.appendChild(item);
            });

        } catch (err) {
            grid.innerHTML = "<p style='color:red;'>Erro ao carregar o conteúdo do R2.</p>";
        }
    }

    function renderizarMenuPastas(pastas) {
        const menuContainer = document.getElementById("folder-menu");
        menuContainer.innerHTML = "";

        // Botão para exibir tudo
        const btnTodas = document.createElement("button");
        btnTodas.className = `folder-btn ${pastaAtiva === "" ? "active" : ""}`;
        btnTodas.innerText = "Todas as Fotos";
        btnTodas.onclick = () => mudarPasta("");
        menuContainer.appendChild(btnTodas);

        // Cria um botão para cada pasta que ele achou no R2
        pastas.forEach(p => {
            const btn = document.createElement("button");
            btn.className = `folder-btn ${pastaAtiva === p ? "active" : ""}`;
            btn.innerText = p.charAt(0).toUpperCase() + p.slice(1); // Primeira letra maiúscula
            btn.onclick = () => mudarPasta(p);
            menuContainer.appendChild(btn);
        });
    }

    function mudarPasta(nomePasta) {
        pastaAtiva = nomePasta;
        carregarDados();
    }
</script>
</body>
</html>
